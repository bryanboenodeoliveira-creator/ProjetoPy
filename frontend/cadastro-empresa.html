<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Empresa - Sistema de Autenticação Canva</title>
  <link rel="stylesheet" href="../static/style.css">
</head>
<body>
  <div class="cadastro-container">
    <!-- Left Logo - Canva -->
    <div class="cadastro-sidebar-left">
      <img src="../static/images/canva-logo.png">
    </div>

    <!-- Center Form Container -->
    <div class="cadastro-form-container">
      <div class="cadastro-form-wrapper">
        <form method="POST" action="/salvar_empresa">
          <!-- Nome da Empresa -->
          <div class="form-group">
            <label for="nome-empresa">Nome da empresa</label>
            <input type="text" id="nome-empresa" name="nome_empresa" required>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>

          <!-- Senha -->
          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required>
          </div>

          <!-- Confirmar Senha -->
          <div class="form-group">
            <label for="confirmar-senha">Confirmar senha</label>
            <input type="password" id="confirmar-senha" name="confirmar_senha" required>
          </div>

          <!-- Telefone -->
          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
          </div>

          <!-- Número de Registro -->
          <div class="form-group">
            <label for="numero-registro">Número de registro</label>
            <input type="text" id="numero-registro" name="numero_registro" required>
          </div>

          <!-- ID da Empresa -->
          <div class="form-group">
            <label for="id-empresa">ID da empresa</label>
            <input type="text" id="id-empresa" name="id_empresa" required>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="submit-button">Cadastrar</button>

          <!-- Footer Text -->
          <p class="form-footer">
            Seu nome de perfil no Canva será compartilhado. Nunca envie senhas.
          </p>
        </form>

        <!-- Back to Login -->
        <div class="back-link">
          <a href="/login">Voltar para Login</a>
        </div>
      </div>
    </div>

    <!-- Right Logo - Palestine Emblem -->
    <div class="cadastro-sidebar-right">
  <img src="../static/images/palestine-emblem.png">
    </div>
  </div>
</body>
</html>
