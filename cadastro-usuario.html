<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário - Sistema de Autenticação Canva</title>
  <link rel="stylesheet" href="../static/style.css">
</head>
<body>
  <div class="cadastro-container">
    <!-- Left Logo - Canva -->
    <div class="cadastro-sidebar-left">
      <img src="../static/images/canva-logo.png">
    </div>

    <!-- Center Form Container -->
    <div class="cadastro-form-container">
      <div class="cadastro-form-wrapper">
        <form method="POST" action="/salvar_usuario">
          <!-- Nome -->
          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>

          <!-- CPF -->
          <div class="form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
          </div>

          <!-- Senha -->
          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required>
          </div>

          <!-- Confirmar Senha -->
          <div class="form-group">
            <label for="confirmar-senha">Confirmar senha</label>
            <input type="password" id="confirmar-senha" name="confirmar_senha" required>
          </div>

          <!-- Telefone -->
          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
          </div>

          <!-- Gênero -->
          <div class="form-group gender-group">
            <label>Gênero</label>
            <div class="gender-options">
              <div class="gender-option">
                <input type="checkbox" id="masculino" name="genero" value="masculino">
                <label for="masculino">Masculino</label>
              </div>
              <div class="gender-option">
                <input type="checkbox" id="feminino" name="genero" value="feminino">
                <label for="feminino">Feminino</label>
              </div>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="submit-button">Cadastrar</button>

          <!-- Footer Text -->
          <p class="form-footer">
            Seu nome de perfil no Canva será compartilhado. Nunca envie senhas.
          </p>
        </form>

        <!-- Back to Login -->
        <div class="back-link">
          <a href="login.html">Voltar para Login</a>
        </div>
      </div>
    </div>

    <!-- Right Logo - Palestine Emblem -->
    <div class="cadastro-sidebar-right">
      <img src="../static/images/palestine-emblem.png">
    </div>
  </div>
</body>
</html>
